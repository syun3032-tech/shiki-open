services:
  shiki:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./.ritsu:/app/.ritsu
      - ./user_config.json:/app/user_config.json
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
